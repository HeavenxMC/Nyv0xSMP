<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to Discord...</title>
  <meta name="robots" content="noindex">

  <!-- Instant redirect -->
  <meta http-equiv="refresh" content="0; url=https://discord.gg/RpdjvHMXD9">

  <!-- Discord embed / social preview tags -->
  <meta property="og:title" content="Join our Discord Server">
  <meta property="og:description" content="Click to join our community on Discord!">
  <meta property="theme-color" content="#5865F2">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1e1f22;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
      text-align: center;
    }
    .card {
      background: #2b2d31;
      padding: 40px 50px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }
    p {
      color: #b5bac1;
      margin-bottom: 20px;
    }
    a.button {
      display: inline-block;
      background: #5865F2;
      color: white;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s ease;
    }
    a.button:hover {
      background: #4752c4;
    }
  </style>

  <script>
    // Fallback JS redirect in case meta refresh is blocked
    window.location.replace("https://discord.gg/RpdjvHMXD9");
  </script>
</head>
<body>
  <div class="card">
    <h1>Redirecting you to Discord…</h1>
    <p>If you are not redirected automatically, click the button below.</p>
    <a class="button" href="https://discord.gg/RpdjvHMXD9">Join Discord</a>
  </div>
</body>
</html>
